name: Build Windows Executable

on:
  push:
    branches: [ "master" ]
  workflow_dispatch: # Permite ejecutarlo manualmente desde la interfaz de GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pyinstaller
        # Si tienes más dependencias en requirements.txt, descomenta la línea de abajo:
        # pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      # Usamos el comando directo para asegurar compatibilidad de rutas en Windows
      run: |
        pyinstaller --noconfirm --onefile --windowed `
        --add-data "templates;templates" `
        --add-data "static;static" `
        --name "CotizadorMotos" `
        app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cotizador-Windows-Package
        path: dist/CotizadorMotos.exe
